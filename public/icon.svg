<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Dark warm sienna gradient for high contrast at small sizes -->
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E5A36" />
      <stop offset="100%" stop-color="#4C2812" />
    </linearGradient>
    <!-- Bright warm sunburst/halo gradient representing light and grace -->
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74" />
      <stop offset="100%" stop-color="#E28647" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2C1B10" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#grad-primary)" filter="url(#shadow)"/>
  
  <!-- Sacred Halo (Warm radiant background glow behind the cross) -->
  <circle cx="256" cy="220" r="140" fill="url(#grad-accent)" opacity="0.25" />
  <circle cx="256" cy="220" r="90" fill="url(#grad-accent)" opacity="0.4" />

  <!-- Sacred Cross as the absolute main subject -->
  <g id="main-cross">
    <!-- Horizontal Beam -->
    <rect x="136" y="200" width="240" height="40" rx="20" fill="#FFFFFF" />
    <!-- Vertical Beam -->
    <rect x="236" y="80" width="40" height="300" rx="20" fill="#FFFFFF" />
    <!-- Golden Core representing grace and presence -->
    <circle cx="256" cy="220" r="14" fill="#E28647" stroke="#FFFFFF" stroke-width="5" />
  </g>
  
  <!-- Supporting modern bottom arch representing hands/community -->
  <path d="M120 410 C180 440, 332 440, 392 410" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.2" />
</svg>
